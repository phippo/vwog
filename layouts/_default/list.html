{{ define "main" }}

<section class="section">
  <h1>{{ .Title }}</h1>
  {{ .Content }}

  <div class="card-grid">
    {{ range .Pages }}
    <article class="card">
      <h3><a href="{{ .RelPermalink }}">{{ .Title }}</a></h3>
      <p>{{ .Description | default .Summary }}</p>
    </article>
    {{ end }}
  </div>
</section>

{{ end }}
