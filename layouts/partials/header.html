<header class="site-header">
  <nav class="nav">
    <a href="{{ "/" | relURL }}" class="nav__logo">{{ .Site.Title }}</a>
    <button class="nav__toggle" aria-label="Menü öffnen" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav__menu">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active" aria-current="page"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </nav>
</header>
